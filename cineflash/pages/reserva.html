<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="https://github.com/KathyAlde21"
                target="_blank" rel="noopener">
                <img src="../assets/img/github.png" alt="GitHub Logo" width="20" height="20" class="icon-github"
                    loading="lazy">
                <span>GitHub</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="../index.html">CineFlash</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div style="height: 56px;"></div> <!-- Espacio para navbar fija -->

    <main class="container py-5">
        <section id="formularioReserva">
            <div class="text-center mb-4">
                <h1>Completa tu reserva</h1>
                <p id="peliculaSeleccionada" class="lead"></p>
            </div>
            <div class="container-formulario" id="formRegistro">
                <form id="formReservaCine">
                    <div class="mb-3">
                        <label for="fechaFuncion" class="form-label">Fecha</label>
                        <input type="date" class="form-control" id="fechaFuncion" required>
                    </div>
                    <div class="mb-3">
                        <label for="cantidadTickets" class="form-label">Cantidad de tickets</label>
                        <select class="form-select" id="cantidadTickets" required>
                            <option value="">Seleccione una cantidad</option>
                            <option value="1">1 ticket</option>
                            <option value="2">2 tickets</option>
                            <option value="3">3 tickets</option>
                            <option value="4">4 tickets</option>
                            <option value="5">5 tickets</option>
                            <option value="6">6 tickets</option>
                        </select>
                    </div>
                    <p id="totalReserva" class="fw-bold text-center mt-3"></p>
                    <p id="mensajeReserva" class="mt-2 mb-3 text-center"></p>
                    <button type="submit" class="btn btn-primary" id="btnConfirmarReserva">
                        Confirmar reserva
                    </button>
                </form>
            </div>
        </section>
        <section id="confirmacionReserva" class="text-center d-none">
            <h1>Reserva Exitosa</h1>
            <p>¡Gracias por reservar tu película con CineFlash!</p>
            <p id="detallePelicula"></p>
            <p id="detalleFecha"></p>
            <p id="detalleCantidad"></p>
            <p id="detalleTotal" class="fw-bold"></p>
            <p id="codigoReserva"></p>
            <img src="../assets/img/tickets-pop-corn-drink-amd-glasses.png" alt="Tickets, cabritas, bebida y lentes 3d"
                width="350" class="icon-reserva" loading="lazy">
        </section>
    </main>

    <div style="height: 56px;"></div> <!-- Espacio sobre el footer garantizado -->
    <footer class="bg-dark text-light">
        <div class="container py-2">
            <div class="d-flex justify-content-center align-items-center gap-3 flex-wrap">
                <p class="mb-0">&copy; 2026 Kathy Alderete</p>
                <a class="btn btn-outline-light btn-sm d-flex align-items-center gap-2"
                    href="https://github.com/KathyAlde21" target="_blank" rel="noopener">
                    <img src="../assets/img/github.png" alt="GitHub Logo" width="20" height="20" class="icon-github"
                        loading="lazy">
                    <span>GitHub</span>
                </a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
    <script src="../assets/js/script.js"></script>
</body>

</html>
