<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"

    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="https://github.com/KathyAlde21"
                target="_blank" rel="noopener">
                <img src="./assets/img/github.png" alt="GitHub Logo" width="20" height="20" class="icon-github"
                    loading="lazy">
                <span>GitHub</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./index.html">CineFlash</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div style="height: 56px;"></div> <!-- Espacio para navbar fija -->

    <!-- link retorno a web principal -->
    <div class="back-to-home d-grid gap-2 d-md-flex justify-content-md-end">
                <button class=" btn me-md-2" type="button">
        <a href="../index.html" class="btn-back">← Volver a proyectos</a>
        </button>
    </div>

    <main class="container py-5">
        <section>
            <div class="mb-5" id="serviciosPrecios">
                <h1 class="mb-4 text-center" id="cineflash">
                    <img src="./assets/img/claqueta-de-cine.webp" alt="claqueta de cine" width="70" height="70"
                        class="icon-cineflash" loading="lazy">
                    Bienvenidos a CineFlash
                </h1>
            </div>
            <div class="row row-cols-1 row-cols-md-3 g-4">
                <div class="col">
                    <div class="card">
                        <img src="./assets/img/john-wick-3.jpg" class="card-img-top" alt="john wick">
                        <div class="card-body">
                            <h5 class="card-title">John Wick 3</h5>
                            <a 
                                class="btn btn-primary btn-reservar"
                                href="./pages/reserva.html" 
                                role="button" 
                                data-pelicula="John Wick 3"
                                data-precio="4500">
                                Reservar
                            </a>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card">
                        <img src="./assets/img/shrek_2001_film.webp" class="card-img-top" alt="shrek uno">
                        <div class="card-body">
                            <h5 class="card-title">Shrek</h5>
                            <a 
                                class="btn btn-primary btn-reservar" 
                                href="./pages/reserva.html"
                                role="button" 
                                data-pelicula="Shrek"
                                data-precio="4000">
                                Reservar
                            </a>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card">
                        <img src="./assets/img/matrix.jpg" class="card-img-top" alt="matrix">
                        <div class="card-body">
                            <h5 class="card-title">Matrix 20 Aniversario</h5>
                            <a 
                                class="btn btn-primary btn-reservar"
                                href="./pages/reserva.html" 
                                role="button"
                                data-pelicula="Matrix 20 Aniversario" 
                                data-precio="5000">
                                Reservar
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div style="height: 56px;"></div> <!-- Espacio sobre el footer garantizado -->
    <footer class="bg-dark text-light">
        <div class="container py-2">
            <div class="d-flex justify-content-center align-items-center gap-3 flex-wrap">
                <p class="mb-0">&copy; 2026 Kathy Alderete</p>
                <a class="btn btn-outline-light btn-sm d-flex align-items-center gap-2"
                    href="https://github.com/KathyAlde21" target="_blank" rel="noopener">
                    <img src="./assets/img/github.png" alt="GitHub Logo" width="20" height="20" class="icon-github"
                        loading="lazy">
                    <span>GitHub</span>
                </a>
            </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"

        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
