<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="https://github.com/KathyAlde21"
                target="_blank" rel="noopener">
                <img src="./assets/img/github.png" alt="GitHub Logo" width="20" height="20" class="icon-github"
                    loading="lazy">
                <span>GitHub</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav">
                    <a class="nav-link active" aria-current="page" href="#formRegistro">Formulario de Registro</a>
                </div>
            </div>
        </div>
    </nav>
    <div style="height: 56px;"></div> <!-- Espacio para navbar fija -->

    <!-- link retorno a web principal -->
    <div class="back-to-home d-grid gap-2 d-md-flex justify-content-md-end">
        <button class=" btn me-md-2" type="button">
            <a href="../index.html" class="btn-back">← Volver a proyectos</a>
        </button>
    </div>

    <main class="container py-2">
        <section>
            <div class="text-center mb-2">
                <h1 class="mb-2">Bienvenido</h1>
                <p id="resumenIngreso" class="lead text-center mt-3"></p>
                <p class="lead">Para unirte a nuestra comunidad, por favor completa el formulario de registro.</p>
            </div>
        </section>
        <section>
            <!-- Formulario de Registro con validadores -->
            <div class="mb-2" id="formRegistro">
                <h2 class="text-center mb-4" id="registro">Formulario de Registro</h2>
                <div class="container-formulario">
                    <form id="formRegistroUsuario">
                        <div class="mb-2">
                            <label for="nombreRegistro" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombreRegistro"
                                placeholder="Ingrese su nombre completo" required>
                        </div>
                        <div class="mb-3">
                            <label for="emailRegistro" class="form-label">Email</label>
                            <input type="email" class="form-control" id="emailRegistro"
                                placeholder="Ingrese su dirección de email" required>
                            <div id="mensajeRegistro" class="mt-2 text-center"></div>
                        </div>
                        <div class="mb-3">
                            <label for="passwordRegistro" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="passwordRegistro"
                                    placeholder="Ingrese su contraseña" required>
                                <button class="btn btn-outline-secondary toggle-password" type="button"
                                    data-target="passwordRegistro" aria-label="Mostrar u ocultar contraseña">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn" id="btnRegistro">Registrarme</button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3">
                ¿Ya tienes una cuenta?
                <a class="btn text-decoration-none" id="btnIniciarSesion" href="./pages/inicio_sesion.html">
                    Inicia sesión aquí
                </a>
            </p>
        </section>
    </main>

    <!-- footer -->
    <div style="height: 56px;"></div> <!-- Espacio sobre el footer garantizado -->
    <footer class="bg-dark text-light">
        <div class="container py-2">
            <div class="d-flex justify-content-center align-items-center gap-3 flex-wrap">
                <p class="mb-0">&copy; 2026 Kathy Alderete</p>
                <a class="btn btn-outline-light btn-sm d-flex align-items-center gap-2"
                    href="https://github.com/KathyAlde21" target="_blank" rel="noopener">
                    <img src="./assets/img/github.png" alt="GitHub Logo" width="20" height="20" class="icon-github"
                        loading="lazy">
                    <span>GitHub</span>
                </a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
    <script src="./assets/js/script.js"></script>
</body>

</html>
