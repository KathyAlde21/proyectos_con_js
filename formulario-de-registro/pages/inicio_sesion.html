<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="https://github.com/KathyAlde21"
                target="_blank" rel="noopener">
                <img src="../assets/img/github.png" alt="GitHub Logo" width="20" height="20" class="icon-github"
                    loading="lazy">
                <span>GitHub</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="../index.html">Formulario de Registro</a>
                    </li>
            </div>
        </div>
    </nav>
    <div style="height: 56px;"></div> <!-- Espacio para navbar fija -->

    <main class="container py-5">
        <section>
            <article>
                <div class="mb-5">
                    <h1 class="text-center mb-4">Bienvenido</h1>
                    <p id="resumenIngreso" class="lead text-center mt-3"></p>
                    <div class="mb-5" id="formRegistro">
                        <div class="container-formulario">
                            <!-- datos pre-ingresados -->
                            <form id="formLoginUsuario">
                                <div class="mb-3">
                                    <label for="emailLogin" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="emailLogin"
                                        placeholder="Ingrese su dirección de email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="passwordLogin" class="form-label">Contraseña</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="passwordLogin"
                                            placeholder="Ingrese su contraseña" required>
                                        <button class="btn btn-outline-secondary toggle-password" type="button"
                                            data-target="passwordLogin" aria-label="Mostrar u ocultar contraseña">
                                            <i class="bi bi-eye-slash"></i>
                                        </button>
                                    </div>
                                </div>
                                <p id="mensajeLogin" class="mt-2 mb-3 text-center"></p>
                                <button type="submit" class="btn" id="btnIniciarSesion">Ingresar</button>
                            </form>
                        </div>
                    </div>
            </article>
        </section>
    </main>
    <div style="height: 56px;"></div> <!-- Espacio sobre el footer garantizado -->
    <footer class="bg-dark text-light">
        <div class="container py-2">
            <div class="d-flex justify-content-center align-items-center gap-3 flex-wrap">
                <p class="mb-0">&copy; 2026 Kathy Alderete</p>
                <a class="btn btn-outline-light btn-sm d-flex align-items-center gap-2"
                    href="https://github.com/KathyAlde21" target="_blank" rel="noopener">
                    <img src="../assets/img/github.png" alt="GitHub Logo" width="20" height="20" class="icon-github"
                        loading="lazy">
                    <span>GitHub</span>
                </a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
    <script src="../assets/js/script.js"></script>

</body>

</html>
